<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animations — editor</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #05060a; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; left: 20px; bottom: 18px; z-index: 10;
        font: 500 13px/1.5 ui-sans-serif, system-ui, sans-serif;
        color: #aeb7c6; letter-spacing: 0.02em; pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
      #hud b { color: #eef2f8; font-weight: 700; }
      #hud .backend { color: #7cf3c2; }
      #fallback {
        position: fixed; inset: 0; display: none; place-items: center; z-index: 20;
        font: 500 15px/1.6 ui-sans-serif, system-ui, sans-serif; color: #cdd5e2;
        text-align: center; padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <b>animations</b> · WebGPU-first creative engine
      <span class="backend" id="backend"></span>
    </div>
    <div id="fallback">
      Could not start a GPU context.<br />
      Try a WebGPU-capable browser (Chrome/Edge 113+, Safari 18+, or Firefox with WebGPU enabled).
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
